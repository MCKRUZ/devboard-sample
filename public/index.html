<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevBoard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>DevBoard</h1>
    <div class="status-badges">
      <span class="badge badge-todo" id="badge-todo">0 Todo</span>
      <span class="badge badge-in_progress" id="badge-in_progress">0 In Progress</span>
      <span class="badge badge-done" id="badge-done">0 Done</span>
    </div>
  </header>

  <div id="error-banner" class="error-banner hidden"></div>

  <div class="toolbar">
    <button class="btn-primary" onclick="openTaskModal()">+ New Task</button>
    <button class="btn-secondary" onclick="openUserModal()">+ New User</button>
  </div>

  <div class="board">
    <div class="column">
      <div class="column-header">To Do</div>
      <div id="col-todo"></div>
    </div>
    <div class="column">
      <div class="column-header">In Progress</div>
      <div id="col-in_progress"></div>
    </div>
    <div class="column">
      <div class="column-header">Done</div>
      <div id="col-done"></div>
    </div>
  </div>

  <!-- New Task Modal -->
  <div id="task-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>New Task</h2>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title">Title *</label>
          <input id="task-title" type="text" placeholder="Task title" required />
        </div>
        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" placeholder="Optional description"></textarea>
        </div>
        <div class="form-group">
          <label for="task-status">Status</label>
          <select id="task-status">
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label for="task-assignee">Assignee</label>
          <select id="task-assignee">
            <option value="">Unassigned</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- New User Modal -->
  <div id="user-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>New User</h2>
      <form id="user-form">
        <div class="form-group">
          <label for="user-name">Name *</label>
          <input id="user-name" type="text" placeholder="Full name" required />
        </div>
        <div class="form-group">
          <label for="user-email">Email *</label>
          <input id="user-email" type="email" placeholder="email@example.com" required />
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeUserModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create User</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
